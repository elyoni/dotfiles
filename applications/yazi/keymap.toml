# Yazi Keymap Configuration
# Based on ranger settings, customized for specific needs

# Navigation - Move to parent directory
# File Operations
[[mgr.prepend_keymap]]
on = "="
run = "chmod"
desc = "Change file permissions"

[[mgr.prepend_keymap]]
on = "I"
run = "rename"
desc = "Edit filename from the start"

[[mgr.prepend_keymap]]
on = "<F7>"
run = "create --dir"
desc = "Create a directory"

# Clone/Duplicate file
[[mgr.prepend_keymap]]
on = ["c", "c"]
run = "shell --block sh -c 'for f in \"$@\"; do cp \"$f\" \"${f}.copy\" && echo \"Cloned: ${f}.copy\"; done'"
desc = "Clone/duplicate file (creates file.copy)"

# Search & Filter
[[mgr.prepend_keymap]]
on = "/"
run = "find"
desc = "Search files by name (fd)"

[[mgr.prepend_keymap]]
on = "?"
run = "search --via=rg"
desc = "Search file contents with ripgrep"

# Toggle hidden files
[[mgr.prepend_keymap]]
on = ["z", "h"]
run = "toggle hidden"
desc = "Toggle hidden files"


# Terminal & Shell
[[mgr.prepend_keymap]]
on = "S"
run = "shell --block $SHELL"
desc = "Spawn shell in current directory"

[[mgr.prepend_keymap]]
on = "<C-g>"
run = "shell --block ~/.dotfiles/applications/yazi/scripts/wimp.sh"
desc = "Jump to project (wimp)"


# Quit & Misc - Disable q for quit
# Using manager.prepend_keymap to override default keybinding
[[mgr.prepend_keymap]]
on = [ "q" , "q" ]
run =  "quit"

# Disable z key (fzf) but allow zf sequence
# First, define the zf sequence in prepend_keymap so it takes precedence
[[mgr.prepend_keymap]]
on = [ "z", "f" ]
run = "filter"
desc = "Filter files"

# Then disable single z key
[[mgr.prepend_keymap]]
on = [ "z" ]
run = "noop"
desc = "Disabled z (fzf)"

[[mgr.prepend_keymap]]
on = [ "t" ]
run = "noop"
desc = "Disabled tag"

# Tabs
[[mgr.prepend_keymap]]
on = ["t", "n"]
run = "tab_create"
desc = "New tab"

[[mgr.prepend_keymap]]
on = ["t", "c"]
run = "tab_close"
desc = "Close tab"

[[mgr.prepend_keymap]]
on = ["t", "1"]
run = "tab_switch 0"
desc = "Switch to tab 1"

[[mgr.prepend_keymap]]
on = ["t", "2"]
run = "tab_switch 1"
desc = "Switch to tab 2"

[[mgr.prepend_keymap]]
on = ["t", "3"]
run = "tab_switch 2"
desc = "Switch to tab 3"

[[mgr.prepend_keymap]]
on = ["t", "4"]
run = "tab_switch 3"
desc = "Switch to tab 4"

[[mgr.prepend_keymap]]
on = ["t", "5"]
run = "tab_switch 4"
desc = "Switch to tab 5"

[[mgr.prepend_keymap]]
on = ["t", "6"]
run = "tab_switch 5"
desc = "Switch to tab 6"

[[mgr.prepend_keymap]]
on = ["t", "7"]
run = "tab_switch 6"
desc = "Switch to tab 7"

[[mgr.prepend_keymap]]
on = ["t", "8"]
run = "tab_switch 7"
desc = "Switch to tab 8"

[[mgr.prepend_keymap]]
on = ["t", "9"]
run = "tab_switch 8"
desc = "Switch to tab 9"

# File copy and paste operations
[[mgr.prepend_keymap]]
on = ["y", "y"]
run = "yank"
desc = "Yank/Copy files (for pasting)"

[[mgr.prepend_keymap]]
on = ["y", "p"]
run = "paste"
desc = "Paste files"

# Yank (copy) commands - copy paths to clipboard
# Note: These copy paths to system clipboard using yazi's copy commands
[[mgr.prepend_keymap]]
on = ["y", "d"]
run = ['copy', 'dirname']
desc = "Copy directory path to clipboard"

[[mgr.prepend_keymap]]
on = ["y", "f"]
run = ['copy', 'filename']
desc = "Copy filename only to clipboard"

# Copy full path to clipboard (using yP to avoid conflict with paste)
[[mgr.prepend_keymap]]
on = ["y", "P"]
run = ['copy', 'path']
desc = "Copy full file path to clipboard"
