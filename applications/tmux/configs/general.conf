# Set default shell to zsh
set-option -g default-shell /usr/bin/zsh

# Disable the auto window name, when using zsh
set-option -g allow-rename off

##Pane Switching Using Mouse
set -g mouse on

set -g history-limit 20000

##Activity Monitoring
setw -g monitor-activity on
set -g visual-activity on

##Remove the delay in the esc button
set -sg escape-time 0
#
##Remove the delay when using the prefix button
set -g repeat-time 0

# Clipboard via OSC 52 (Ghostty, SSH, etc.)
# https://github.com/tmux/tmux/wiki/Clipboard
set -g allow-passthrough on
set -s set-clipboard on
set -as terminal-features ',xterm-ghostty:clipboard'
set -as terminal-features ',tmux-256color:clipboard'

# Use vim keybindings in copy mode
setw -g mode-keys vi

# copy-pipe sends to system clipboard; copy-selection only uses tmux buffer
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
